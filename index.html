<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050609" />
  <title>Cydver's Pull Roadmap</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <section class="title-block">
        <p class="eyebrow">Public Viewer</p>
        <h1>Cydver's Pull Roadmap</h1>
        <p id="summary" class="summary">Loading roadmap…</p>
      </section>
      <div class="viewer-controls">
        <button id="btnOpenPullCalculator" class="viewer-utility-action viewer-utility-calc" type="button" aria-controls="pullCalculator" aria-expanded="false">Pull Calc</button>
      </div>
    </header>

    <section class="legend-panel" aria-label="Meta status legend">
      <div class="legend-wrap">
        <div class="legend-title">Meta status <span>PVP only</span></div>
        <div id="statusLegend" class="legend"></div>
        <div class="legend-filter-controls" aria-label="Custom unit highlight filter">
          <button id="btnCustomUnitFilter" class="viewer-utility-action viewer-utility-filter" type="button" aria-pressed="false" aria-expanded="false">Filter Units</button>
          <span id="customUnitFilterStatus" class="legend-filter-status hidden" aria-live="polite"></span>
          <button id="btnSaveCustomUnitFilter" class="hidden viewer-filter-action primary-action" type="button">Save</button>
          <button id="btnClearCustomUnitFilter" class="hidden viewer-filter-action" type="button">Clear</button>
          <button id="btnCancelCustomUnitFilter" class="hidden viewer-filter-action" type="button">Cancel</button>
        </div>
      </div>
      <div id="customUnitFilterHint" class="legend-filter-hint hidden">Selection mode · click an MS, paired pilot, or meta bar to toggle that MS timeline.</div>
    </section>

    <section id="message" class="message hidden"></section>

    <section id="chartScroll" class="chart-scroll" aria-label="Roadmap chart">
      <div id="chartStage" class="chart-stage">
        <div id="roadmap" class="roadmap"></div>
      </div>
    </section>
  </main>

  <aside id="pullCalculator" class="diamond-planner-drawer pull-calculator-drawer hidden" aria-label="Pull probability calculator">
    <div class="diamond-planner-head">
      <div>
        <p class="eyebrow">Pickup probability</p>
        <h2>Pull Calculator</h2>
      </div>
      <button id="btnClosePullCalculator" class="drawer-close" type="button" aria-label="Close pull calculator">×</button>
    </div>

    <div class="pull-calc-inputs">
      <label class="diamond-balance-field" for="pullCalcDiamonds">
        <span>Diamonds</span>
        <input id="pullCalcDiamonds" type="number" min="0" step="300" inputmode="numeric" value="0" />
      </label>

      <section class="pull-calc-banner-field" aria-label="MS banner settings">
        <label class="pull-calc-target-field" for="pullCalcMsTarget">
          <span>MS target</span>
          <select id="pullCalcMsTarget">
            <option value="0">None</option>
            <option value="1">P0 · 1 copy</option>
            <option value="2">P1 · 2 copies</option>
            <option value="3">P2 · 3 copies</option>
            <option value="4">P3 · 4 copies</option>
            <option value="5">P4 · 5 copies</option>
            <option value="6">P5 · 6 copies</option>
          </select>
        </label>
        <label class="pull-calc-ticket-field" for="pullCalcMsTickets">
          <span>MS tickets</span>
          <input id="pullCalcMsTickets" type="number" min="0" step="1" inputmode="numeric" value="0" />
        </label>
        <label class="pull-calc-pity-field" for="pullCalcMsPity">
          <input id="pullCalcMsPity" type="checkbox" checked />
          <span>Use 200-pull pity on pickup</span>
        </label>
      </section>

      <section class="pull-calc-banner-field" aria-label="Pilot banner settings">
        <label class="pull-calc-target-field" for="pullCalcPilotTarget">
          <span>Pilot target</span>
          <select id="pullCalcPilotTarget">
            <option value="0">None</option>
            <option value="1">P0 · 1 copy</option>
            <option value="2">P1 · 2 copies</option>
            <option value="3">P2 · 3 copies</option>
            <option value="4">P3 · 4 copies</option>
            <option value="5">P4 · 5 copies</option>
            <option value="6">P5 · 6 copies</option>
          </select>
        </label>
        <label class="pull-calc-ticket-field" for="pullCalcPilotTickets">
          <span>Pilot tickets</span>
          <input id="pullCalcPilotTickets" type="number" min="0" step="1" inputmode="numeric" value="0" />
        </label>
        <label class="pull-calc-pity-field" for="pullCalcPilotPity">
          <input id="pullCalcPilotPity" type="checkbox" checked />
          <span>Use 200-pull pity on pickup</span>
        </label>
      </section>
    </div>

    <div id="pullCalcResult" class="pull-calc-result" aria-live="polite"></div>

    <section class="pull-calc-breakdown" aria-labelledby="pullCalcBreakdownTitle">
      <div class="pull-calc-breakdown-head">
        <div>
          <h3 id="pullCalcBreakdownTitle">P-Level Chances</h3>
        </div>
        <div class="pull-calc-tabs" role="group" aria-label="Probability breakdown">
          <button id="btnPullCalcMsBreakdown" type="button" aria-pressed="true">MS</button>
          <button id="btnPullCalcPilotBreakdown" type="button" aria-pressed="false">Pilot</button>
        </div>
      </div>
      <div id="pullCalcProbabilityList" class="pull-calc-probability-list"></div>
    </section>

    <button id="btnResetPullCalculator" class="diamond-clear" type="button">Reset calculator</button>
  </aside>

  <aside id="unitDrawer" class="unit-drawer hidden" aria-live="polite">
    <button id="btnCloseDrawer" class="drawer-close" type="button" aria-label="Close">×</button>
    <div id="drawerContent"></div>
  </aside>

  <div id="tooltip" class="tooltip hidden" role="tooltip"></div>

  <script src="viewer.js"></script>
</body>
</html>
